<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Gallery</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Basic&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <header>
        <img src="assets/logo.svg" alt="World Cup Gallery" class="logo-principal">
    </header>

    <nav class="botonera-mundiales" id="botonera">
        <button class="btn-mundial" data-year="1930"><img src="assets/logos/1930.png" alt="Mundial 1930"></button>
        <button class="btn-mundial" data-year="1934"><img src="assets/logos/1934.png" alt="Mundial 1934"></button>
        <button class="btn-mundial" data-year="1938"><img src="assets/logos/1938.png" alt="Mundial 1938"></button>
        <button class="btn-mundial" data-year="1950"><img src="assets/logos/1950.png" alt="Mundial 1950"></button>
        <button class="btn-mundial" data-year="1954"><img src="assets/logos/1954.png" alt="Mundial 1954"></button>
        <button class="btn-mundial" data-year="1958"><img src="assets/logos/1958.png" alt="Mundial 1958"></button>
        <button class="btn-mundial" data-year="1962"><img src="assets/logos/1962.png" alt="Mundial 1962"></button>
        <button class="btn-mundial" data-year="1966"><img src="assets/logos/1966.png" alt="Mundial 1966"></button>
        <button class="btn-mundial" data-year="1970"><img src="assets/logos/1970.png" alt="Mundial 1970"></button>
        <button class="btn-mundial" data-year="1974"><img src="assets/logos/1974.png" alt="Mundial 1974"></button>
        <button class="btn-mundial" data-year="1978"><img src="assets/logos/1978.png" alt="Mundial 1978"></button>
        <button class="btn-mundial" data-year="1982"><img src="assets/logos/1982.png" alt="Mundial 1982"></button>
        <button class="btn-mundial" data-year="1986"><img src="assets/logos/1986.png" alt="Mundial 1986"></button>
        <button class="btn-mundial" data-year="1990"><img src="assets/logos/1990.png" alt="Mundial 1990"></button>
        <button class="btn-mundial" data-year="1994"><img src="assets/logos/1994.png" alt="Mundial 1994"></button>
        <button class="btn-mundial" data-year="1998"><img src="assets/logos/1998.png" alt="Mundial 1998"></button>
        <button class="btn-mundial" data-year="2002"><img src="assets/logos/2002.png" alt="Mundial 2002"></button>
        <button class="btn-mundial" data-year="2006"><img src="assets/logos/2006.png" alt="Mundial 2006"></button>
        <button class="btn-mundial" data-year="2010"><img src="assets/logos/2010.png" alt="Mundial 2010"></button>
        <button class="btn-mundial" data-year="2014"><img src="assets/logos/2014.png" alt="Mundial 2014"></button>
        <button class="btn-mundial" data-year="2018"><img src="assets/logos/2018.png" alt="Mundial 2018"></button>
        <button class="btn-mundial" data-year="2022"><img src="assets/logos/2022.png" alt="Mundial 2022"></button>
    </nav>

    <main>
        <div class="visor-container">
            <model-viewer 
                id="visor-3d" 
                src="assets/copa.glb" 
                camera-controls 
                auto-rotate 
                shadow-intensity="1"
                environment-image="neutral">
            </model-viewer>
        </div>

        <section class="ficha-tecnica" id="ficha">
            <h2 id="ficha-mundial">Galería de los Campeones</h2>
            <p><strong>Campeón:</strong> <span id="ficha-campeon">-</span></p>
            <p><strong>Marca:</strong> <span id="ficha-marca">-</span></p>
            <p class="detalles" id="ficha-detalles">Seleccioná un mundial en la botonera superior para explorar en 3D la camiseta ganadora, sus detalles textiles y su historia.</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
